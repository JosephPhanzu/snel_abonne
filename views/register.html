
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - WillPharma</title>
  	<link rel="shortcut icon" type="image/png" href="/assets/img/logo.png"/>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn-script.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 position-relative">
    <div class="position-absolute border-blue-500/30 rounded-lg shadow-sm p-3 d-none col-md-4" id="info"></div>
    <div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div class="text-center">
                <div class="flex justify-center">
                    <img src="/assets/img/logo.png" width="80" alt="logo" />
                </div>
                <h2 class="mt-6 text-3xl font-bold text-gray-900">WillPharma</h2>
                <p class="mt-2 text-sm text-gray-600">Créer votre compte</p>
            </div>
            
            <div class="bg-white rounded-lg shadow-sm border p-8">
                <form class="space-y-6" id="form-register">
                    <div>
                        <label for="nom" class="block text-sm font-medium text-gray-700">Nom</label>
                        <input id="nom" name="nom" type="text" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="votre nom" />
                    </div>

                    <div>
                        <label for="prenom" class="block text-sm font-medium text-gray-700">Prénom</label>
                        <input id="prenom" name="prenom" type="prenom" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"placeholder="votre Prénom" />
                    </div>
                    
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                        <input id="email" name="email" type="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="votre@email.com" />
                    </div>

                    <div>
                        <label for="tel" class="block text-sm font-medium text-gray-700">Téléphone</label>
                        <input id="tel" name="tel" type="tel" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="votre numéro de téléphone" />
                    </div>
                    
                    <div>
                        <label for="adresse" class="block text-sm font-medium text-gray-700">Adresse</label>
                        <input id="adresse" name="adresse" type="text" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="votre adresse" />
                    </div>  

                    <div>
                        <label for="password1" class="block text-sm font-medium text-gray-700">
                            Mot de passe
                        </label>
                        <input id="password1" name="password1" type="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="••••••••" />
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">
                            Confirmer le mot de passe
                        </label>
                        <input id="password" name="password" type="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="••••••••" />
                    </div>

                    <div>
                        <button 
                            type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-md font-medium transition-colors"
                        >
                            Créer un compte
                        </button>
                    </div>
                </form>

                <div class="mt-6 text-center">
                    <a href="/" class="text-blue-600 hover:text-blue-700 text-sm">
                        ← Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.9.0/dist/axios.min.js"></script>

    <script>
        lucide.createIcons();

        $(document).ready(function(){
            
            $(document).on('submit', '#form-register', async function(e) {
                e.preventDefault();
                formData = new FormData(this);

                const res = await axios.post('/add_proprietaire', formData);
                console.log(res.data.message);
                $('#info').removeClass('d-none');
                if (res.data.status === 'success') {
                    $('#info').removeClass('error').addClass('success').hide().fadeIn("slow");
                    setTimeout(() => {
                        location.reload();
                    }, 2000);
                }else{
                    $('#info').removeClass('success').addClass('error').hide().fadeIn("slow");
                }
                $('#info').html(res.data.message);
            })

        })

    </script>
</body>
</html>
